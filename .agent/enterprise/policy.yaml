enterprise:
  enabled: true
  default_role: developer
  roles:
    developer:
      permissions:
        - transaction.run
        - transaction.read
        - workspace.read
        - memory.read
        - skills.read
        - plugins.read
        - plugins.install
        - enterprise.policy.read
        - enterprise.secrets.check
        - enterprise.runners.read
    auditor:
      permissions:
        - transaction.read
        - memory.read
        - plugins.read
        - enterprise.policy.read
        - enterprise.secrets.check
        - enterprise.runners.read
        - enterprise.audit.read
        - enterprise.compliance.generate
    admin:
      permissions:
        - "*"
  policy_server:
    mode: local
    url: null
    policy_path: null
  secrets:
    provider: env
    allowed_prefixes:
      - AGENTHUB_
    required: []
  runners:
    default: local
    remote: []
  model_routing:
    private_models: []
    private_runner: null
