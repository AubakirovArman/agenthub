task:
  id: generate_dataset_report
  type: data.command
  title: Generate a data quality report

workspace:
  type: data.git
  isolation: git_worktree

execution:
  commands:
    - mkdir -p data/reports
    - "printf '{\"rows\": 0, \"status\": \"placeholder\"}\\n' > data/reports/quality.json"

scope:
  allow:
    - data/**
  deny:
    - .agent/**

verify:
  profile: data_quality
  commands:
    - test -s data/reports/quality.json
    - grep -q '"status"' data/reports/quality.json

transaction:
  commit_on_success: true
  memory_promotion: on_success
  diff_limits:
    max_files_changed: 3
    max_lines_added: 80
    max_lines_deleted: 20
