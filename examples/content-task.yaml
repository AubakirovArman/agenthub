task:
  id: draft_article
  type: content.command
  title: Draft a content artifact

workspace:
  type: content.git
  isolation: git_worktree

execution:
  commands:
    - mkdir -p content/articles
    - printf '# AgentHub Notes\n\nDraft content.\n' > content/articles/agenthub-notes.md

scope:
  allow:
    - content/**
  deny:
    - .agent/**

verify:
  profile: content_quality
  commands:
    - test -s content/articles/agenthub-notes.md
    - grep -q 'AgentHub' content/articles/agenthub-notes.md

transaction:
  commit_on_success: true
  memory_promotion: on_success
  diff_limits:
    max_files_changed: 3
    max_lines_added: 80
    max_lines_deleted: 20

