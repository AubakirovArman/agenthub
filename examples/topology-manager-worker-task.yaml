task:
  id: manager_worker_demo
  type: code.command
  title: Run a manager-worker topology

topology:
  kind: manager_worker
  swarm_size: 2

workspace:
  type: code.git
  isolation: git_worktree

execution:
  commands:
    - mkdir -p generated
    - printf 'managed\n' > generated/managed.txt

scope:
  allow:
    - generated/**
  deny:
    - .agent/**

verify:
  commands:
    - test -f generated/managed.txt

transaction:
  commit_on_success: true
  memory_promotion: on_success
  diff_limits:
    max_files_changed: 2
    max_lines_added: 5
    max_lines_deleted: 0
